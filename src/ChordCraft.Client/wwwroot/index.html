<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChordCraft.Client</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="ChordCraft.Client.styles.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            important: '.tw',
            theme: {
                extend: {
                    fontFamily: { nunito: ['Nunito', 'sans-serif'] },
                    colors: {
                        brand: { light: '#E0F7FA', DEFAULT: '#00B4D8', dark: '#0096B4' },
                        accent: { DEFAULT: '#FFB703', dark: '#FB8500' },
                        navy: { DEFAULT: '#1E293B', dark: '#0F172A' }
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.08)',
                        '3d': '0 4px 0 0 rgba(0,0,0,0.1)',
                        '3d-brand': '0 4px 0 0 #0096B4',
                        '3d-accent': '0 4px 0 0 #FB8500',
                    }
                }
            }
        }
    </script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="js/localStorage.js"></script>
    <script src="js/inputCapture.js"></script>
    <script src="js/audio.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
